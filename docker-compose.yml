version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yuti-rag-backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./knowledge_bases:/app/knowledge_bases
      - ./conversation_history:/app/conversation_history
      # Mount model directory if downloaded locally
      - ./bge-small-zh-v1.5:/app/bge-small-zh-v1.5
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: yuti-rag-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5174:5174"
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    depends_on:
      - backend
    restart: unless-stopped
